groups:
  - name: voiceforge
    rules:
      - alert: HighTurnLatency
        expr: histogram_quantile(0.95, sum(rate(voiceforge_turn_latency_ms_bucket[5m])) by (le)) > 1500
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: p95 voice turn latency above 1.5s
      - alert: BookingFailures
        expr: increase(voiceforge_bookings_total{result="error"}[10m]) > 3
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: Multiple booking failures in the last 10 minutes
      - alert: CallEscalations
        expr: increase(voiceforge_calls_total{outcome="escalated"}[15m]) > 5
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: Elevated human-escalation rate
